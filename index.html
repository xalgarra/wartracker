<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="login-screen">
    <div class="login-eyebrow">▸ wartracker.ops <span class="blink">_</span></div>
    <div class="login-wordmark">War<span class="accent">Tracker</span></div>
    <div class="login-sub login-sub-light">Tu colección, en orden.</div>
    <div class="login-sub login-sub-dark">// acceso a tu armería personal</div>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p id="error-msg">Email o contraseña incorrectos</p>
  </div>

  <div id="app-screen">
    <div class="header">
      <div class="logo">
        <span class="logo-glyph"></span>
        <span class="logo-mark">WarTracker</span>
        <span class="logo-status"><span class="logo-status-dot"></span>online</span>
      </div>
      <div class="header-actions">
        <button class="btn-link btn-theme" id="btn-theme" onclick="toggleDarkMode()">🌙</button>
        <button class="btn-link" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-coleccion" onclick="cambiarTab('coleccion')">Colección</button>
      <button class="tab" id="tab-stats" onclick="cambiarTab('stats')">Estadísticas</button>
      <button class="tab" id="tab-wishlist" onclick="cambiarTab('wishlist')">Wishlist</button>
      <button class="tab" id="tab-pinturas" onclick="cambiarTab('pinturas')">Pinturas</button>
    </div>

    <button class="fab" onclick="abrirModal()">+</button>

    <div id="vista-coleccion">
      <div class="filtros">
        <select id="filtro-game" onchange="actualizarFiltroFacciones()">
          <option value="">Todos los juegos</option>
        </select>
        <select id="filtro-faction" onchange="cargarMinis()">
          <option value="">Todas las facciones</option>
        </select>
        <select id="filtro-status" onchange="cargarMinis()">
          <option value="">Todos los estados</option>
          <option value="comprada">Comprada</option>
          <option value="montada">Montada</option>
          <option value="imprimada">Imprimada</option>
          <option value="pintando">Pintando</option>
          <option value="pintada">Pintada</option>
        </select>
        <select id="filtro-type" onchange="onFiltroType()">
          <option value="">Todos los tipos</option>
          <option value="único">Único</option>
          <option value="personaje">Personaje</option>
          <option value="infantería">Infantería</option>
          <option value="élite">Élite</option>
          <option value="caballería">Caballería</option>
          <option value="vehículo">Vehículo</option>
          <option value="monstruo">Monstruo</option>
          <option value="aeronave">Aeronave</option>
          <option value="artillería">Artillería</option>
          <option value="faction terrain">Faction Terrain</option>
        </select>
        <input id="busqueda" type="search" placeholder="Buscar por nombre…" oninput="onBusqueda(this.value)">
      </div>
      <div class="sort-bar">
        <span class="sort-label">Ordenar:</span>
        <button class="sort-btn active" data-sort="reciente" data-label="Reciente" onclick="onOrdenar(this)">Reciente ↓</button>
        <button class="sort-btn" data-sort="nombre"  data-label="Nombre"   onclick="onOrdenar(this)">Nombre</button>
        <button class="sort-btn" data-sort="estado"  data-label="Estado"   onclick="onOrdenar(this)">Estado</button>
        <button class="sort-btn" data-sort="juego"   data-label="Juego"    onclick="onOrdenar(this)">Juego</button>
      </div>
      <div class="lista" id="lista"></div>
    </div>

    <div id="vista-stats" style="display:none">
      <div id="stats-content" class="stats-container"></div>
    </div>

    <div id="vista-wishlist" style="display:none">
      <div class="lista" id="lista-wishlist"></div>
    </div>

    <div id="vista-pinturas" style="display:none">
      <div class="catalog-search-section">
        <div class="catalog-search-row">
          <input type="search" id="catalog-search" placeholder="Añadir del catálogo Citadel…" oninput="onCatalogSearch(this.value)" onfocus="onCatalogSearch(this.value)" autocomplete="off">
          <button class="btn-camera" onclick="abrirCamara()" title="Escanear pote con cámara">📷</button>
        </div>
        <div class="catalog-results" id="catalog-results"></div>
      </div>
      <div class="filtros filtros-pinturas">
        <select id="filtro-paint-type" onchange="filtrarYRenderPinturas()">
          <option value="">Todos los tipos</option>
          <option value="base">Base</option>
          <option value="layer">Layer</option>
          <option value="shade">Shade</option>
          <option value="dry">Dry</option>
          <option value="contrast">Contrast</option>
          <option value="technical">Technical</option>
          <option value="air">Air</option>
          <option value="spray">Spray</option>
          <option value="texture">Texture</option>
          <option value="primer">Primer</option>
        </select>
        <select id="filtro-paint-stock" onchange="filtrarYRenderPinturas()">
          <option value="">Todas</option>
          <option value="1">En stock</option>
          <option value="0">Sin stock</option>
        </select>
        <input type="search" id="busqueda-paint" placeholder="Buscar nombre o marca…" oninput="filtrarYRenderPinturas()">
      </div>
      <div class="paint-list" id="lista-pinturas"></div>
    </div>
  </div>

  <div class="modal-bg" id="modal-bg" onclick="cerrarModalFondo(event)">
    <div class="modal">
      <div class="modal-eye">▸ nuevo registro</div>
      <h2 id="modal-title">Añadir miniatura</h2>

      <div class="modal-photo-section">
        <img id="photo-preview" class="modal-photo-preview" style="display:none" alt="">
        <div class="modal-photo-actions">
          <label class="btn-photo" for="photo-input">
            <span id="photo-btn-text">Añadir foto</span>
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="onPhotoSelected(this)">
          </label>
          <button type="button" id="btn-remove-photo" class="btn-photo-remove" onclick="removePhoto()" style="display:none">Eliminar foto</button>
        </div>
      </div>

      <select id="game" onchange="actualizarFacciones()"></select>
      <select id="faction" onchange="actualizarUnidades()"></select>
      <select id="unit-select" onchange="onUnitChange()"></select>
      <input id="name-custom" placeholder="Nombre personalizado" style="display:none">
      <div id="extra-factions-container" style="display:none"></div>
      <label class="field-label" for="qty">Cantidad — nº de cajas o lotes</label>
      <input id="qty" type="number" min="1" value="1">
      <label class="field-label" for="models">Modelos en la unidad (opcional — ej: 10 para una caja de 10 marines)</label>
      <input id="models" type="number" min="1" placeholder="">
      <label class="field-label" for="status">Estado</label>
      <select id="status">
        <option value="comprada">Comprada</option>
        <option value="montada">Montada</option>
        <option value="imprimada">Imprimada</option>
        <option value="pintando">Pintando</option>
        <option value="pintada">Pintada</option>
        <option disabled>──────────</option>
        <option value="wishlist">Wishlist</option>
      </select>
      <textarea id="notes" placeholder="Notas (opcional)" rows="3"></textarea>
      <div class="modal-btns">
        <button id="btn-eliminar" class="btn-danger" onclick="eliminarMini()" style="display:none">Eliminar</button>
        <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarMini()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modal-paint-bg" onclick="cerrarModalPinturaFondo(event)">
    <div class="modal">
      <div class="modal-eye">▸ nueva pintura</div>
      <h2 id="modal-paint-title">Añadir pintura</h2>
      <input id="paint-brand" list="brands-list" placeholder="Marca" autocomplete="off" oninput="onPaintBrandInput()">
      <datalist id="brands-list">
        <option value="Citadel">
        <option value="Vallejo">
        <option value="Army Painter">
        <option value="Scale75">
        <option value="Reaper">
        <option value="AK Interactive">
        <option value="Warcolours">
        <option value="Green Stuff World">
      </datalist>
      <div class="catalog-search-row">
        <input id="paint-name" placeholder="Nombre de la pintura" list="paint-names-list" autocomplete="off" oninput="onPaintNameInput()">
        <button class="btn-camera" type="button" onclick="abrirCamara('modal')" title="Escanear pote con cámara">📷</button>
      </div>
      <datalist id="paint-names-list"></datalist>
      <label class="field-label">Tipo</label>
      <select id="paint-type">
        <option value="base">Base</option>
        <option value="layer">Layer</option>
        <option value="shade">Shade</option>
        <option value="dry">Dry</option>
        <option value="contrast">Contrast</option>
        <option value="technical">Technical</option>
        <option value="air">Air</option>
        <option value="spray">Spray</option>
        <option value="texture">Texture</option>
        <option value="primer">Primer</option>
      </select>
      <div class="paint-color-row">
        <label class="paint-color-label">
          <input type="checkbox" id="paint-has-color" onchange="toggleColorPicker(this)">
          <span>Definir color</span>
        </label>
        <input type="color" id="paint-color-hex" value="#aaaaaa" style="display:none">
        <button type="button" class="btn-color-search" onclick="buscarColorExterno()" title="Buscar color en Google">🔍</button>
      </div>
      <label class="field-label" for="paint-qty">Cantidad de potes</label>
      <input id="paint-qty" type="number" min="1" value="1">
      <label class="paint-stock-check">
        <input type="checkbox" id="paint-in-stock" checked>
        <span>En stock</span>
      </label>
      <div class="modal-btns">
        <button id="btn-eliminar-paint" class="btn-danger" onclick="eliminarPintura()" style="display:none">Eliminar</button>
        <button class="btn-cancel" onclick="cerrarModalPintura()">Cancelar</button>
        <button class="btn-primary" onclick="guardarPintura()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Overlay cámara para escanear pote -->
  <div class="camera-overlay" id="camera-overlay">
    <div class="camera-header">
      <span class="camera-title">Apunta al pote</span>
      <button class="camera-close" onclick="cerrarCamara()">✕</button>
    </div>
    <div class="camera-viewport">
      <video id="camera-video" autoplay playsinline muted></video>
      <div class="camera-guide"></div>
    </div>
    <div class="camera-footer">
      <button class="camera-capture-btn" id="camera-capture-btn" onclick="capturarPote()">
        <span class="camera-shutter"></span>
      </button>
    </div>
    <div class="camera-result" id="camera-result" style="display:none">
      <div class="camera-result-inner">
        <div class="camera-result-swatch" id="camera-result-swatch"></div>
        <div class="camera-result-info">
          <div class="camera-result-name" id="camera-result-name"></div>
          <div class="camera-result-type" id="camera-result-type"></div>
        </div>
      </div>
      <div class="camera-result-actions">
        <button class="btn-cancel" onclick="reintentarCamara()">Reintentar</button>
        <button class="btn-primary" onclick="confirmarPoteCamara()">Añadir</button>
      </div>
    </div>
    <div class="camera-scanning" id="camera-scanning" style="display:none">
      <div class="camera-spinner"></div>
      <span>Identificando…</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/paint-colors.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
