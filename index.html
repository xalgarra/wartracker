<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarTracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='oklch(0.55 0.14 30)'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <script>
    ;(function(){
      const s = localStorage.getItem('wt_theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (s === 'dark' || (!s && prefersDark)) document.body.classList.add('dark')
    })()
  </script>

  <div id="login-screen">
    <div class="login-eyebrow">▸ wartracker.ops <span class="blink">_</span></div>
    <div class="login-wordmark">War<span class="accent">Tracker</span></div>
    <div class="login-sub login-sub-light">Tu colección, en orden.</div>
    <div class="login-sub login-sub-dark">// acceso a tu armería personal</div>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button id="btn-login">Entrar</button>
    <p id="error-msg">Email o contraseña incorrectos</p>
  </div>

  <div id="app-screen">
    <div class="header">
      <div class="logo">
        <span class="logo-glyph"></span>
        <span class="logo-mark">WarTracker</span>
        <span class="logo-status"><span class="logo-status-dot"></span>online</span>
      </div>
      <div class="header-actions">
        <button class="btn-link btn-theme" id="btn-theme">🌙</button>
        <button class="btn-link" id="btn-logout">Cerrar sesión</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-coleccion">Colección</button>
      <button class="tab" id="tab-stats">Estadísticas</button>
      <button class="tab" id="tab-wishlist">Wishlist</button>
      <button class="tab" id="tab-pinturas">Pinturas</button>
    </div>

    <button class="fab" id="btn-fab">+</button>

    <div id="vista-coleccion">
      <div class="filtros">
        <select id="filtro-game">
          <option value="">Todos los juegos</option>
        </select>
        <select id="filtro-faction">
          <option value="">Todas las facciones</option>
        </select>
        <select id="filtro-status"></select>
        <select id="filtro-type"></select>
        <input id="busqueda" type="search" placeholder="Buscar por nombre…">
      </div>
      <div class="sort-bar">
        <span class="sort-label">Ordenar:</span>
        <button class="sort-btn active" data-sort="reciente" data-label="Reciente">Reciente ↓</button>
        <button class="sort-btn" data-sort="nombre"  data-label="Nombre">Nombre</button>
        <button class="sort-btn" data-sort="estado"  data-label="Estado">Estado</button>
        <button class="sort-btn" data-sort="juego"   data-label="Juego">Juego</button>
      </div>
      <div class="lista" id="lista"></div>
    </div>

    <div id="vista-stats" style="display:none">
      <div id="stats-content" class="stats-container"></div>
    </div>

    <div id="vista-wishlist" style="display:none">
      <div class="lista" id="lista-wishlist"></div>
    </div>

    <div id="vista-pinturas" style="display:none">
      <div class="catalog-search-section">
        <div class="catalog-search-row">
          <input type="search" id="catalog-search" placeholder="Añadir del catálogo Citadel…" autocomplete="off">
          <button class="btn-camera" id="btn-camera-catalog" title="Escanear pote con cámara">📷</button>
        </div>
        <div class="catalog-results" id="catalog-results"></div>
      </div>
      <div class="filtros filtros-pinturas">
        <select id="filtro-paint-type"></select>
        <select id="filtro-paint-stock">
          <option value="">Todas</option>
          <option value="1">En stock</option>
          <option value="0">Sin stock</option>
        </select>
        <input type="search" id="busqueda-paint" placeholder="Buscar nombre o marca…">
      </div>
      <div class="paint-list" id="lista-pinturas"></div>
    </div>
  </div>

  <!-- Modal: añadir/editar miniatura -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-eye">▸ nuevo registro</div>
      <h2 id="modal-title">Añadir miniatura</h2>

      <div class="modal-photo-section">
        <img id="photo-preview" class="modal-photo-preview" style="display:none" alt="">
        <div class="modal-photo-actions">
          <label class="btn-photo" for="photo-input">
            <span id="photo-btn-text">Añadir foto</span>
            <input type="file" id="photo-input" accept="image/*" style="display:none">
          </label>
          <button type="button" id="btn-remove-photo" class="btn-photo-remove" style="display:none">Eliminar foto</button>
        </div>
      </div>

      <select id="game"></select>
      <select id="faction"></select>
      <select id="unit-select"></select>
      <input id="name-custom" placeholder="Nombre personalizado" style="display:none">
      <div id="extra-factions-container" style="display:none"></div>
      <label class="field-label" for="qty">Cantidad — nº de cajas o lotes</label>
      <input id="qty" type="number" min="1" value="1">
      <label class="field-label" for="models">Modelos en la unidad (opcional — ej: 10 para una caja de 10 marines)</label>
      <input id="models" type="number" min="1" placeholder="">
      <label class="field-label" for="status">Estado</label>
      <select id="status"></select>
      <textarea id="notes" placeholder="Notas (opcional)" rows="3"></textarea>
      <div class="modal-btns">
        <button id="btn-eliminar" class="btn-danger" style="display:none">Eliminar</button>
        <button id="btn-cerrar-modal" class="btn-cancel">Cancelar</button>
        <button id="btn-guardar-mini" class="btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: añadir/editar pintura -->
  <div class="modal-bg" id="modal-paint-bg">
    <div class="modal">
      <div class="modal-eye">▸ nueva pintura</div>
      <h2 id="modal-paint-title">Añadir pintura</h2>
      <input id="paint-brand" list="brands-list" placeholder="Marca" autocomplete="off">
      <datalist id="brands-list"></datalist>
      <div class="catalog-search-row">
        <input id="paint-name" placeholder="Nombre de la pintura" list="paint-names-list" autocomplete="off">
        <button class="btn-camera" id="btn-camera-modal" type="button" title="Escanear pote con cámara">📷</button>
      </div>
      <datalist id="paint-names-list"></datalist>
      <label class="field-label">Tipo</label>
      <select id="paint-type"></select>
      <div class="paint-color-row">
        <label class="paint-color-label">
          <input type="checkbox" id="paint-has-color">
          <span>Definir color</span>
        </label>
        <input type="color" id="paint-color-hex" value="#aaaaaa" style="display:none">
        <button type="button" id="btn-color-search" class="btn-color-search" title="Buscar color en Google">🔍</button>
      </div>
      <label class="field-label" for="paint-qty">Cantidad de potes</label>
      <input id="paint-qty" type="number" min="1" value="1">
      <label class="paint-stock-check">
        <input type="checkbox" id="paint-in-stock" checked>
        <span>En stock</span>
      </label>
      <div class="modal-btns">
        <button id="btn-eliminar-paint" class="btn-danger" style="display:none">Eliminar</button>
        <button id="btn-cerrar-modal-paint" class="btn-cancel">Cancelar</button>
        <button id="btn-guardar-pintura" class="btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Overlay cámara -->
  <div class="camera-overlay" id="camera-overlay">
    <div class="camera-header">
      <span class="camera-title">Apunta al pote</span>
      <button class="camera-close" id="btn-cerrar-camara">✕</button>
    </div>
    <div class="camera-viewport">
      <video id="camera-video" autoplay playsinline muted></video>
      <div class="camera-guide"></div>
    </div>
    <div class="camera-footer">
      <button class="camera-capture-btn" id="camera-capture-btn">
        <span class="camera-shutter"></span>
      </button>
    </div>
    <div class="camera-result" id="camera-result" style="display:none">
      <div class="camera-result-inner">
        <div class="camera-result-swatch" id="camera-result-swatch"></div>
        <div class="camera-result-info">
          <div class="camera-result-name" id="camera-result-name"></div>
          <div class="camera-result-type" id="camera-result-type"></div>
        </div>
      </div>
      <div class="camera-result-actions">
        <button id="btn-reintentar-camara" class="btn-cancel">Reintentar</button>
        <button id="btn-confirmar-camara" class="btn-primary">Añadir</button>
      </div>
    </div>
    <div class="camera-scanning" id="camera-scanning" style="display:none">
      <div class="camera-spinner"></div>
      <span>Identificando…</span>
    </div>
  </div>

  <div id="status-picker" class="status-picker"></div>
  <div id="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
