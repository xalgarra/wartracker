<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarTracker</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.5rem; }
    form { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
    input, select, textarea { padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.6rem; font-size: 1rem; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #555; }
    .filtros { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filtros select { flex: 1; min-width: 140px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { font-weight: 600; }
    .empty { color: #999; padding: 1rem 0; }
    #login-screen { max-width: 360px; margin: 4rem auto; }
    #login-screen h2 { margin-bottom: 1.5rem; }
    #login-screen input { width: 100%; margin-bottom: 0.75rem; }
    #error-msg { color: #c00; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
    #app-screen { display: none; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .top-bar h1 { margin: 0; }
    .btn-link { background: none; border: none; color: #666; cursor: pointer; font-size: 0.9rem; padding: 0; }
    .btn-link:hover { color: #333; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2>WarTracker</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p id="error-msg">Email o contraseña incorrectos</p>
  </div>

  <div id="app-screen">
    <div class="top-bar">
      <h1>WarTracker</h1>
      <button class="btn-link" onclick="logout()">Cerrar sesión</button>
    </div>

    <form id="form">
      <input id="name" placeholder="Nombre (ej. Intercessors)" required>
      <select id="game" onchange="actualizarFacciones()">
        <option value="">Cargando juegos...</option>
      </select>
      <select id="faction">
        <option value="">Selecciona primero un juego</option>
      </select>
      <input id="qty" type="number" min="1" value="1" placeholder="Cantidad">
      <select id="status">
        <option value="comprada">Comprada</option>
        <option value="montada">Montada</option>
        <option value="imprimada">Imprimada</option>
        <option value="pintada">Pintada</option>
      </select>
      <textarea id="notes" placeholder="Notas (opcional)" rows="2"></textarea>
      <button type="submit">Añadir mini</button>
    </form>

    <div class="filtros">
      <select id="filtro-game" onchange="actualizarFiltroFacciones()">
        <option value="">Todos los juegos</option>
      </select>
      <select id="filtro-faction" onchange="cargarMinis()">
        <option value="">Todas las facciones</option>
      </select>
      <select id="filtro-status" onchange="cargarMinis()">
        <option value="">Todos los estados</option>
        <option value="comprada">Comprada</option>
        <option value="montada">Montada</option>
        <option value="imprimada">Imprimada</option>
        <option value="pintada">Pintada</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Facción</th>
          <th>Juego</th>
          <th>Cant.</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase
    const db = createClient(
      'https://yxmviaviyglyemoyqfws.supabase.co',
      'sb_publishable_P4QRQ6nMPQKvLYvVN_shaQ_8ixoMhPw'
    )

    let games = []
    let factions = []

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const { error } = await db.auth.signInWithPassword({ email, password })
      if (error) {
        document.getElementById('error-msg').style.display = 'block'
      } else {
        mostrarApp()
      }
    }

    async function logout() {
      await db.auth.signOut()
      document.getElementById('app-screen').style.display = 'none'
      document.getElementById('login-screen').style.display = 'block'
    }

    async function mostrarApp() {
      document.getElementById('login-screen').style.display = 'none'
      document.getElementById('app-screen').style.display = 'block'
      await inicializar()
    }

    async function inicializar() {
      const { data: gamesData } = await db.from('games').select('*').order('name')
      const { data: factionsData } = await db.from('factions').select('*').order('name')

      games = gamesData || []
      factions = factionsData || []

      const selectGame = document.getElementById('game')
      selectGame.innerHTML = games.map(g =>
        `<option value="${g.slug}">${g.name}</option>`
      ).join('')

      const filtroGame = document.getElementById('filtro-game')
      filtroGame.innerHTML = '<option value="">Todos los juegos</option>' +
        games.map(g => `<option value="${g.slug}">${g.name}</option>`).join('')

      actualizarFacciones()
      cargarMinis()
    }

    function actualizarFacciones() {
      const gameSlug = document.getElementById('game').value
      const filtradas = factions.filter(f => f.game_slug === gameSlug)
      const selectFaction = document.getElementById('faction')
      selectFaction.innerHTML = filtradas.map(f =>
        `<option value="${f.name}">${f.name}</option>`
      ).join('')
    }

    function actualizarFiltroFacciones() {
      const gameSlug = document.getElementById('filtro-game').value
      const filtradas = gameSlug
        ? factions.filter(f => f.game_slug === gameSlug)
        : factions
      const filtroFaction = document.getElementById('filtro-faction')
      filtroFaction.innerHTML = '<option value="">Todas las facciones</option>' +
        filtradas.map(f => `<option value="${f.name}">${f.name}</option>`).join('')
      cargarMinis()
    }

    async function cargarMinis() {
      const filtroGame = document.getElementById('filtro-game').value
      const filtroFaction = document.getElementById('filtro-faction').value
      const filtroStatus = document.getElementById('filtro-status').value

      let query = db.from('minis').select('*').order('created_at', { ascending: false })
      if (filtroGame) query = query.eq('game', filtroGame)
      if (filtroFaction) query = query.eq('faction', filtroFaction)
      if (filtroStatus) query = query.eq('status', filtroStatus)

      const { data, error } = await query
      if (error) { console.error(error); return }

      const lista = document.getElementById('lista')
      if (!data.length) {
        lista.innerHTML = '<tr><td colspan="5" class="empty">No hay minis con estos filtros</td></tr>'
        return
      }
      lista.innerHTML = data.map(m => `
        <tr>
          <td>${m.name}</td>
          <td>${m.faction || '-'}</td>
          <td>${games.find(g => g.slug === m.game)?.name || m.game}</td>
          <td>${m.qty}</td>
          <td>${m.status}</td>
        </tr>
      `).join('')
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const { error } = await db.from('minis').insert({
        name: document.getElementById('name').value,
        faction: document.getElementById('faction').value,
        game: document.getElementById('game').value,
        qty: parseInt(document.getElementById('qty').value),
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
      })
      if (error) { alert('Error: ' + error.message); return }
      e.target.reset()
      document.getElementById('qty').value = 1
      actualizarFacciones()
      cargarMinis()
    })

    // Comprobar si ya hay sesión activa al cargar
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        mostrarApp()
      }
    })
  </script>
</body>
</html>
